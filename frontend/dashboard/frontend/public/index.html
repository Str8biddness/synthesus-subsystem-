<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SI Engine Chat</title>
    <style>
        body { font-family: monospace; background: #0a0a0a; color: #00ff00; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; border-bottom: 1px solid #333; }
        #input-container { padding: 20px; display: flex; }
        input { flex: 1; background: #111; border: 1px solid #00ff00; color: #00ff00; padding: 10px; font-family: monospace; }
        button { background: #00ff00; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .message { margin-bottom: 15px; }
        .user { color: #fff; }
        .si { color: #00ff00; }
        .meta { font-size: 0.8em; color: #888; }
        #status { position: fixed; top: 10px; right: 10px; font-size: 0.8em; }
    </style>
</head>
<body>
    <div id="status">STATUS: INITIALIZING...</div>
    <div id="chat"></div>
    <div id="input-container">
        <input type="text" id="query" placeholder="ENTER QUERY..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">ASK</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const status = document.getElementById('status');

        async function checkHealth() {
            try {
                const res = await fetch('http://localhost:5001/health');
                if (res.ok) status.innerText = 'STATUS: ONLINE';
                else status.innerText = 'STATUS: DEGRADED';
            } catch {
                status.innerText = 'STATUS: OFFLINE';
            }
        }
        setInterval(checkHealth, 5001);
        checkHealth();

        async function send() {
            const input = document.getElementById('query');
            const query = input.value;
            if (!query) return;
            
            appendMessage('USER', query, 'user');
            input.value = '';

            try {
                const res = await fetch('http://localhost:5001/api/si/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const data = await res.json();
                appendMessage('SI', data.response, 'si', data);
            } catch (e) {
                appendMessage('SYSTEM', 'COMMUNICATION ERROR', 'meta');
            }
        }

        function appendMessage(sender, text, className, meta = null) {
            const div = document.createElement('div');
            div.className = 'message ' + className;
            div.innerHTML = `<strong>${sender}:</strong> ${text}`;
            if (meta) {
                const m = document.createElement('div');
                m.className = 'meta';
                m.innerText = `CONFIDENCE: ${meta.confidence.toFixed(2)} | COHERENCE: ${meta.dsinn.coherence.toFixed(2)}`;
                div.appendChild(m);
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
